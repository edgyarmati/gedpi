name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify GedPi
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify
